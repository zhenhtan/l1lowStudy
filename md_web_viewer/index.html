<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeaningProgram Markdown Viewer</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="bg-mesh" aria-hidden="true"></div>
    <header class="app-header">
      <div class="brand-block">
        <p class="eyebrow">L1Low Utility</p>
        <h1>LeaningProgram Markdown Viewer</h1>
        <p class="subtitle">快速浏览、搜索并阅读学习样例里的 Markdown 文档</p>
      </div>
      <div class="header-actions">
        <input id="searchInput" type="search" placeholder="搜索文件名或路径..." />
        <button id="refreshBtn" type="button">刷新列表</button>
      </div>
    </header>

    <main class="layout">
      <aside class="panel file-panel">
        <div class="panel-title-row">
          <h2>文件列表</h2>
          <span id="fileCount" class="pill">0</span>
        </div>
        <nav id="fileTree" class="file-tree" aria-label="Markdown files"></nav>
      </aside>

      <section class="panel preview-panel">
        <div class="preview-topbar">
          <h2 id="docTitle">请选择左侧文件</h2>
          <div class="meta-row">
            <span id="docMeta" class="meta-text">-</span>
            <button id="copyPathBtn" type="button">复制路径</button>
          </div>
        </div>
        <article id="renderArea" class="markdown-body">
          <p class="placeholder">加载后会在这里渲染 Markdown。</p>
        </article>
      </section>
    </main>

    <script src="/app.js"></script>
  </body>
  </html>
